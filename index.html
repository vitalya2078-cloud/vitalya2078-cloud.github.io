<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Таймер праздника</title>
  <link rel="stylesheet" href="style.css?v=9" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-wrapper">
    <div class="container">
      <header class="card-header">
        <h1>Таймер праздника</h1>
        <p class="subtitle">Выберите дату события</p>
      </header>

      <div class="date-picker-block">
        <!-- 1. ГОД -->
        <div class="input-group">
          <label class="label-custom">Год</label>
          <button type="button" id="yearTrigger" class="custom-dropdown-trigger">
            <span id="yearDisplay" class="trigger-text">--</span>
            <span class="trigger-arrow">▼</span>
          </button>
          <div id="yearDropdown" class="custom-dropdown-menu"></div>
        </div>

        <!-- 2. МЕСЯЦ -->
        <div class="input-group">
          <label class="label-custom">Месяц</label>
          <button type="button" id="monthTrigger" class="custom-dropdown-trigger">
            <span id="monthDisplay" class="trigger-text">--</span>
            <span class="trigger-arrow">▼</span>
          </button>
          <div id="monthDropdown" class="custom-dropdown-menu"></div>
        </div>

        <!-- 3. ДЕНЬ -->
        <div class="input-group">
          <label class="label-custom">День</label>
          <button type="button" id="dayTrigger" class="custom-dropdown-trigger">
            <span id="dayDisplay" class="trigger-text">--</span>
            <span class="trigger-arrow">▼</span>
          </button>
          <div id="dayDropdown" class="custom-dropdown-menu"></div>
        </div>
      </div>

      <!-- Кастомная кнопка расчёта -->
      <button type="button" id="calcBtn" class="btn-primary" disabled>ПОЕХАЛИ</button>

      <div class="divider"></div>

      <div class="result-block" id="resultBlock" style="display:none;">
        <div class="countdown-top-area">
          <span class="countdown-label">Осталось</span>
          <div class="big-number-wrapper">
            <span id="daysUntilBirthday" class="big-number">0</span>
            <span id="unitText" class="unit-text">дней</span>
          </div>
        </div>

        <div class="divider" style="margin: 20px 0;"></div>

        <div class="below-divider-area">
          <div class="unit-switcher">
            <button type="button" class="unit-btn active" data-unit="days">Дни</button>
            <button type="button" class="unit-btn" data-unit="weeks">Недели</button>
            <button type="button" class="unit-btn" data-unit="months">Месяцы</button>
          </div>

          <div class="progress-area">
            <div class="progress-text">
              <span>Прогресс года</span>
              <span id="percentText" class="percent-val">0%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>

          <button type="button" id="shareBtn" class="btn-secondary">Отправить в чат</button>
        </div>
      </div>

      <div class="empty-state" id="emptyState">
        <svg class="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
        </svg>
        <p>Выберите год, затем месяц и день события</p>
      </div>

      <footer class="card-footer">
        <span class="hint">Работает без установки</span>
        <div class="version">v3.5</div>
      </footer>
    </div>
  </div>

  <script src="script.js?v=9"></script>
</body>
</html>
