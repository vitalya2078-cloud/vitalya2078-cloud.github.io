<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Test Button</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { background: #0b0d12; color: #fff; font-family: system-ui; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    h1 { text-align: center; }
  </style>
</head>
<body>
  <h1>Проверка MainButton</h1>
  <script>
    const tg = window.Telegram.WebApp;
    if (tg) {
      console.log('Telegram detected');
      tg.ready();
      tg.expand();

      const btn = tg.MainButton;
      btn.setText('ТЕСТОВАЯ КНОПКА');
      btn.setColor('#4caf50');
      btn.setTextColor('#ffffff');
      btn.onClick(() => {
        alert('Кнопка работает!');
        tg.close();
      });
      btn.show(); // явно показываем
    } else {
      console.error('Not in Telegram');
    }
  </script>
</body>
</html>
